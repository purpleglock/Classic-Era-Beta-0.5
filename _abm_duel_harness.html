<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<title>Окно перехвата — визуальный стенд</title>
<link rel="stylesheet" href="css/index.css">
<style>body{margin:0;background:#070b11;font-family:system-ui,sans-serif}</style>
</head><body>
<div id="host"></div>
<script>
// Стенд: только разметка «Окна перехвата» и тревоги — без Supabase и экономики.
// Сценарий: 3 слота ПРО (разведка отсеяла «Рой ложных целей»), выбор ещё не сделан.
const P = [
  { id:'low',   name:'Низкая траектория', desc:'Идёт над самой атмосферой, прячась в тени рельефа. Мало времени на реакцию.' },
  { id:'high',  name:'Высокая дуга',      desc:'Выходит на баллистическую дугу и падает отвесно. Видно рано — сбить трудно.' },
  { id:'decoy', name:'Рой ложных целей',  desc:'Снаряд идёт в облаке обманок. Сеть перегружена целями.' },
];
function trace(id, out) {
  const st = out ? 'var(--t4)' : 'var(--abm-red)';
  const path = id === 'low'
    ? `<path d="M4 30 C 40 30, 72 34, 96 44" fill="none" stroke="${st}" stroke-width="2"/>`
    : id === 'high'
      ? `<path d="M6 6 C 56 8, 86 18, 96 44" fill="none" stroke="${st}" stroke-width="2"/>`
      : `<path d="M4 12 C 44 18, 72 30, 96 44" fill="none" stroke="${st}" stroke-width="2"/>
         <path d="M4 12 C 48 26, 70 40, 88 52" fill="none" stroke="${st}" stroke-width="1" opacity=".55"/>
         <path d="M4 12 C 40 12, 78 22, 98 30" fill="none" stroke="${st}" stroke-width="1" opacity=".55"/>`;
  return `<svg class="abm-trace" viewBox="0 0 104 56" width="104" height="56">
    <path d="M0 52 C 30 44, 74 44, 104 52 L104 56 L0 56 Z" fill="color-mix(in srgb, var(--abm-red) 22%, transparent)"/>
    ${path}<circle cx="96" cy="46" r="3" fill="${st}"/></svg>`;
}
const cards = P.map(p => {
  const out = p.id === 'decoy';
  return `<button class="abm-card${out ? ' is-out' : ''}"${out ? ' disabled' : ''}>
    ${trace(p.id, out)}
    <span class="abm-card-nm">${p.name}</span>
    <span class="abm-card-ds">${p.desc}</span>
    <span class="abm-card-tag">${out ? 'ИСКЛЮЧЕНО РАЗВЕДКОЙ' : '▸ НАВЕСТИ СЮДА'}</span></button>`;
}).join('');
document.getElementById('host').innerHTML = `
<div style="padding:18px;max-width:900px">
  <div class="ec-bld abm-alert" style="margin-bottom:16px">
    <div class="abm-alert-hd"><span class="abm-alert-ic">☢</span><span class="abm-alert-tt">Входящая отметка</span><span class="abm-alert-eta">подлёт 5 ч</span></div>
    <div class="abm-alert-tx">Цель — <b>Тартар II</b>. Противник выбрал один из трёх способов подхода. Угадайте его до подлёта — ПРО собьёт снаряд. Не зайдёте — сеть отработает сама, малым шансом.</div>
    <div class="ec-bld-act"><button class="btn btn-gh btn-sm">⌁ Вести перехват</button></div>
  </div>
</div>
<div class="abm-duel show" style="position:static;padding:18px">
  <div class="abm-win">
    <div class="abm-win-hd"><span class="abm-win-tt">Окно перехвата</span><span class="abm-win-sub">Тартар II</span><button class="abm-win-x">✕</button></div>
    <div class="abm-win-bd">
      <div class="abm-lead">Угадайте, <b>как</b> снаряд подойдёт к планете — и ПРО собьёт его.</div>
      <ol class="abm-rules">
        <li><b>Что происходит.</b> По планете «Тартар II» летит снаряд. Подлёт — <b>5 ч</b>.</li>
        <li><b>В чём выбор.</b> Противник уже задал <b>один</b> из трёх способов подхода и вам его не видно. Ваша ПРО успевает отработать только по одному варианту.</li>
        <li><b>Чем кончится.</b> Угадали — снаряд сбит, планета цела. Промах — удар проходит. Решение одно и назад не берётся.</li>
      </ol>
      <div class="abm-intel"><div class="abm-intel-k">Разведка · слотов ПРО 3 · шанс перехвата — 1 из 2</div>
        <div class="abm-intel-v">Разведка отсеяла одну версию: это <b>не</b> «Рой ложных целей». Осталось два варианта.</div></div>
      <div class="abm-cards">${cards}</div>
      <div class="abm-state">Наведите ПРО до подлёта. Не успеете — сеть отработает автоматически, но лишь малым шансом от числа слотов.</div>
    </div>
  </div>
</div>`;
</script>
</body></html>

<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<title>Harness: доска боя</title>
<link rel="stylesheet" href="css/24_battle.css">
<style>
  body { margin:0; background:#04060b; font-family: system-ui, sans-serif; }
  .hn { position:fixed; z-index:9999; bottom:10px; left:10px; display:flex; gap:6px; flex-wrap:wrap; }
  .hn button { background:#122; color:#7fd9ea; border:1px solid #2a5566; padding:6px 10px; font-size:12px; cursor:pointer; }
  .btn { background:#16323d; color:#cfe6f0; border:1px solid #2a5566; padding:5px 10px; font-size:12px; cursor:pointer; }
  .btn:disabled { opacity:.4; }
</style></head><body>

<div class="hn">
  <button onclick="hSet('forming')">Фаза: расстановка</button>
  <button onclick="hSet('active')">Фаза: бой (мой ход)</button>
  <button onclick="hSet('foe')">Фаза: ход врага</button>
  <button onclick="hSet('done')">Фаза: победа</button>
</div>

<script>
// ── Стабы окружения (в бою нужны только эти четыре) ──
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function jsq(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function toast(m,k){ console.log('[toast:'+(k||'ok')+']', m); }
function ecReload(){}

// ── Поддельное состояние боя ──
const H = { phase: 'forming' };
function hUnits(){
  const mk=(id,side,mine,name,cls,x,y,hp,mhp,sh,msh)=>({id,side,mine,name,cls,x,y,hp,max_hp:mhp,shield:sh,max_shield:msh,armor:120,dmg:340,speed:cls==='corvette'?4:cls==='dreadnought'?2:3,rng:cls==='corvette'?3:cls==='dreadnought'?7:5,moved:false,fired:false});
  return [
    mk('u1','attacker',true,'Клинок Зари','corvette',3,4,480,500,0,0),
    mk('u2','attacker',true,'Верный','frigate',2,7,2100,2500,300,400),
    mk('u3','attacker',true,'Молот Предела','dreadnought',1,10,40000,40000,900,1200),
    mk('u4','attacker',true,'Скорый','corvette',4,12,220,500,0,0),
    mk('e1','defender',false,'Страж Рубежа','cruiser',20,5,3400,5000,0,600),
    mk('e2','defender',false,'Тень','corvette',18,9,500,500,120,120),
    mk('e3','defender',false,'Бастион','battleship',23,11,15000,15000,0,0),
  ];
}
function hState(){
  const base = {
    id:'b1', kind:'intercept', system_id:'sys_7', system_name:'Гелиос-7',
    w:26, h:16, cap:50, my_side:'attacker', my_fid:'fac_a',
    attacker:'fac_a', attacker_name:'Эрленд', defender:'fac_b', defender_name:'Кассандрия',
    att_turns_left:4, def_turns_left:5, turn_no:5,
    deadline_at: new Date(Date.now()+3600*1000*7).toISOString(),
    can_force:false, winner:null,
    log:[{m:'Бой начался. Первый ход за нападающими.'},{m:'Клинок Зари → Тень: 340 урона'},{m:'Страж Рубежа → Верный: 610 урона'},{m:'Молот Предела → Бастион: 1200 урона — цель уничтожена'}],
    pool:[
      {unit_id:'p1', unit_name:'Клинок Зари', free:6, cls:'corvette', hp:500, dmg:340, speed:4, rng:3},
      {unit_id:'p2', unit_name:'Верный', free:3, cls:'frigate', hp:2500, dmg:520, speed:3, rng:4},
      {unit_id:'p3', unit_name:'Молот Предела', free:1, cls:'dreadnought', hp:40000, dmg:2400, speed:2, rng:7},
    ],
    units: hUnits(),
  };
  if (H.phase === 'forming') return Object.assign(base, { status:'forming', att_ready:false, def_ready:true, side_to_move:null, my_turn:false, units:[] });
  if (H.phase === 'active')  return Object.assign(base, { status:'active', att_ready:true, def_ready:true, side_to_move:'attacker', my_turn:true });
  if (H.phase === 'foe')     return Object.assign(base, { status:'active', att_ready:true, def_ready:true, side_to_move:'defender', my_turn:false, can_force:true });
  return Object.assign(base, { status:'done', winner:'fac_a', side_to_move:null, my_turn:false });
}
async function ecRpc(fn, body){
  if (fn === 'battle_state') return hState();
  console.log('[rpc]', fn, body);
  return { ok:true };
}
function hSet(p){ H.phase = p; bbReload(); }
</script>
<script src="battle_board.js"></script>
<script>
  // выбранный корабль для проверки подсветки хода/дальности
  bbOpen('b1').then(() => { BB.sel = 'u2'; bbRender(); });
</script>
</body></html>
